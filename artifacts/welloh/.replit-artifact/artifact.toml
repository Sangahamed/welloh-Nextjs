kind = "web"
previewPath = "/"
title = "Welloh"
version = "1.0.0"
id = "artifacts/welloh"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19841

[services.development]
run = "pnpm --filter @workspace/welloh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/welloh", "run", "build" ]
publicDir = "artifacts/welloh/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19841"
BASE_PATH = "/"
